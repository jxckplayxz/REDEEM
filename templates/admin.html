<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-10">
    <div class="max-w-2xl mx-auto bg-white p-8 rounded-2xl shadow-sm">
        <h1 class="text-2xl font-bold mb-6">Add New Match</h1>
        
        <form method="POST" class="space-y-4">
            <div>
                <label class="block text-sm font-medium">Section Name (e.g. Champions League)</label>
                <input type="text" name="section_name" required class="w-full p-2 border rounded-lg mt-1" placeholder="Enter section...">
            </div>
            <div>
                <label class="block text-sm font-medium">Match Title</label>
                <input type="text" name="title" required class="w-full p-2 border rounded-lg mt-1" placeholder="Real Madrid vs Barcelona">
            </div>
            <div>
                <label class="block text-sm font-medium">Stream URL</label>
                <input type="url" name="url" required class="w-full p-2 border rounded-lg mt-1" placeholder="https://...">
            </div>
            <div>
                <label class="block text-sm font-medium">Thumbnail URL</label>
                <input type="url" name="thumb" class="w-full p-2 border rounded-lg mt-1" placeholder="https://image-link.jpg">
            </div>
            <button type="submit" class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold hover:bg-blue-700 transition">Add to Website</button>
        </form>

        <a href="/" class="block text-center mt-6 text-gray-500 underline text-sm">View Frontend</a>
    </div>
</body>
</html>
